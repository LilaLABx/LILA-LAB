# fly.toml — LILA Lab Discord Bot
# https://fly.io/docs/reference/configuration/

app = "lila-lab-bot"
primary_region = "sin"  # Singapore — closest to Bangladesh

[build]

[env]
  PYTHON_VERSION = "3.11"

# No HTTP service needed for Discord bot
# [services]
#   internal_port = 8080
#   protocol = "tcp"

#   [services.concurrency]
#     type = "connections"
#     hard_limit = 25
#     soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
