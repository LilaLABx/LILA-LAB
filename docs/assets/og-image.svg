<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006D77;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004E56;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E29578;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E76F51;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle pattern -->
  <g opacity="0.05">
    <circle cx="100" cy="100" r="200" fill="white"/>
    <circle cx="1100" cy="530" r="250" fill="white"/>
    <circle cx="600" cy="315" r="150" fill="white"/>
  </g>

  <!-- Accent bar -->
  <rect x="80" y="180" width="80" height="6" rx="3" fill="url(#accent)"/>

  <!-- LILA Lab title -->
  <text x="80" y="260" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="96" font-weight="700" fill="white" letter-spacing="-2">LILA</text>
  <text x="380" y="260" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="96" font-weight="300" fill="#E29578" letter-spacing="-2">Lab</text>

  <!-- Tagline -->
  <text x="80" y="330" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.9)">Your language. Your stories. Amplified by AI.</text>

  <!-- Description -->
  <text x="80" y="390" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.7)">Language Intelligence for Low-resource Applications</text>

  <!-- Stats row -->
  <g transform="translate(80, 440)">
    <rect x="0" y="0" width="200" height="80" rx="12" fill="rgba(255,255,255,0.1)"/>
    <text x="100" y="35" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">7,000+</text>
    <text x="100" y="60" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="400" fill="rgba(255,255,255,0.7)" text-anchor="middle">languages</text>

    <rect x="220" y="0" width="200" height="80" rx="12" fill="rgba(255,255,255,0.1)"/>
    <text x="320" y="35" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">91.7%</text>
    <text x="320" y="60" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="400" fill="rgba(255,255,255,0.7)" text-anchor="middle">accuracy</text>

    <rect x="440" y="0" width="200" height="80" rx="12" fill="rgba(255,255,255,0.1)"/>
    <text x="540" y="35" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">664K+</text>
    <text x="540" y="60" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="400" fill="rgba(255,255,255,0.7)" text-anchor="middle">articles</text>

    <rect x="660" y="0" width="200" height="80" rx="12" fill="rgba(255,255,255,0.1)"/>
    <text x="760" y="35" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">Open</text>
    <text x="760" y="60" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="400" fill="rgba(255,255,255,0.7)" text-anchor="middle">source</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.2)"/>
  <text x="80" y="615" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.6)">github.com/LilaLABx/LILA-LAB</text>
  <text x="1120" y="615" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="16" font-weight="400" fill="rgba(255,255,255,0.6)" text-anchor="end">@LILA_Lab</text>
</svg>
