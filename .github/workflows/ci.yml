# LILA Lab CI — lint, test, validate
name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Ruff lint
        run: ruff check pipelines/shared/ pipelines/template/ infrastructure/scripts/ cli/ tests/
      - name: Ruff format check
        run: ruff format --check pipelines/shared/ pipelines/template/ infrastructure/scripts/ cli/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - name: Pytest
        run: |
          if [ -d tests ]; then
            pytest --tb=short -q
          else
            echo "No tests/ directory — skipping"
          fi

  validate-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Validate pipeline schemas
        run: python infrastructure/scripts/validate_schemas.py
